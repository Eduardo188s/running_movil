name: recorrido_salud
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_launcher_icons: ^0.13.1
  flutter_blue_plus: ^1.34.5
  image_picker: ^1.0.2
  animate_do: ^4.2.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  firebase_storage: ^11.6.9
  cloud_firestore: ^4.15.8
  flutter_blue: ^0.8.0
  flutter_reactive_ble: ^5.4.0
  flutter_local_notifications: ^13.0.0
  timezone: ^0.9.0
  shared_preferences: ^2.2.3


dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/running_logo.png"
  adaptive_icon_background: "assets/images/running_logo.png"

flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/running_logo.png
    - assets/images/ruta.png
    - assets/images/reloj1.png
